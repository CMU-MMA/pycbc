; Single deterministic injection for the multi_inspiral_fir validation case.
; Point-particle sub-solar TaylorF2 signal whose intrinsic parameters land on a
; fine-bank grid point (mass1=mass2=1.0), face-on and loud, at a fixed sky
; position (the directed-search target) and coalescence time. Used with
; pycbc_create_injections --ninjections 1.
; tc is a (narrowly-bounded) variable param so create_injections writes an
; actual injection row (with all-static params it writes only metadata attrs).
; The coalescence time is effectively fixed at ~1187008882; the exact drawn
; value is read back from the output file.
[variable_params]
tc =

[static_params]
approximant = TaylorF2
mass1 = 1.8416
mass2 = 1.8416
spin1z = 0.0
spin2z = 0.0
f_lower = 45.0
f_ref = 45.0
inclination = 0.0
coa_phase = 0.0
polarization = 0.0
distance = 170.0
ra = 3.44527994344
dec = -0.408407044967
taper = start

[prior-tc]
name = uniform
min-tc = 1187008881.95
max-tc = 1187008882.05
